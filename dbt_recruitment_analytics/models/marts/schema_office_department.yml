version: 2

models:
  - name: mart_hr_executive_overview_by_office_department
    description: "Executive recruitment KPIs grouped by office and department."
    columns:
      - name: generated_at
        tests:
          - not_null
      - name: office_name
        tests:
          - not_null
      - name: department_name
        tests:
          - not_null
      - name: total_jobs
        tests:
          - not_null
      - name: total_applications
        tests:
          - not_null

  - name: mart_application_status_by_office_department
    description: "Application status distribution by office and department."
    columns:
      - name: office_name
        tests:
          - not_null
      - name: department_name
        tests:
          - not_null
      - name: application_status
        tests:
          - not_null
      - name: applications_count
        tests:
          - not_null

  - name: mart_recruitment_funnel_by_office_department
    description: "Recruitment funnel by office and department."
    columns:
      - name: office_name
        tests:
          - not_null
      - name: department_name
        tests:
          - not_null
      - name: stage_name
        tests:
          - not_null
      - name: applications_reached
        tests:
          - not_null

  - name: mart_recruiter_workload
    description: "Recruiter workload and responsiveness indicators by office and department."
    columns:
      - name: recruiter_name
        tests:
          - not_null
      - name: office_name
        tests:
          - not_null
      - name: department_name
        tests:
          - not_null
      - name: total_applications
        tests:
          - not_null
      - name: active_applications
        tests:
          - not_null
      - name: recruiter_owned_stage_cases
        tests:
          - not_null
